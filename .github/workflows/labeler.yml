name: Label PRs based on changed files

on:
  pull_request_target:

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply area labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true
